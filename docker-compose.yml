version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: ai_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_backend
    restart: unless-stopped
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - MONGODB_URI=mongodb://mongodb:27017/ai_task_platform
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkey998877665544332211
      - NODE_ENV=development
    depends_on:
      - mongodb
      - redis

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: ai_worker
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ai_task_platform
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_frontend
    restart: unless-stopped
    ports:
      - "5173:8080"
    environment:
      - VITE_API_URL=http://localhost:5005/api
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data:
